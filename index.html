<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>TV Signage Engine</title>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; font-family: sans-serif; }
        
        /* Layout Containers */
        #screen-root { display: flex; flex-direction: column; height: 100vh; }
        
        .main-split { display: flex; flex: 1; overflow: hidden; }
        .left-pane { flex: 1; font-size: 1.5rem; line-height: 1.6; background: white; }
        .left-pane iframe { width: 100%; height: 100%; border: none; }
        .right-pane { flex: 1; }
        .right-pane img { width: 100%; height: 100%; object-fit: cover; }

        /* Looping Ticker Footer */
        .footer-ticker {
            height: 60px;
            background: #cc0000;
            color: white;
            display: flex;
            align-items: center;
            overflow: hidden; /* Hide the text as it leaves the box */
            white-space: nowrap;
            font-size: 1.2rem;
            font-weight: bold;
        }

        .ticker-content {
            display: inline-block;
            padding-left: 100%; /* Start the text off-screen to the right */
            animation: ticker-loop linear infinite;
        }

        @keyframes ticker-loop {
            0% { transform: translate(0, 0); }
            100% { transform: translate(-100%, 0); }
        }
    </style>
</head>
<body>

    <div id="screen-root">
        </div>

    <script>
        // 1. Simulate the data coming from your .NET CQRS Query
        const serverData = {
            layoutType: "VERTICAL_SPLIT_WITH_TICKER",
            components: {
                mainContent: {
                    externalUrl: "https://www.wikipedia.org",
                    imageUrl: "https://picsum.photos/1080/1920"
                },
                footer: {
                    msg: "+++ LIVE UPDATES FROM THE BACKEND +++ MONGODB CONNECTED +++ NEW SYSTEM ONLINE +++ ",
                    speed: "20s"
                }
            }
        };

        // 2. The Rendering Engine
        function renderLayout(data) {
            const root = document.getElementById('screen-root');

            if (data.layoutType === "VERTICAL_SPLIT_WITH_TICKER") {
                root.innerHTML = `
                    <div class="main-split">
                        <div class="left-pane">
                          <iframe src="${data.components.mainContent.externalUrl}"></iframe>
                        </div>
                        <div class="right-pane">
                            <img src="${data.components.mainContent.imageUrl}">
                        </div>
                    </div>
                    <div class="footer-ticker">
                        <div class="ticker-content" style="animation-duration: ${data.components.footer.speed}">
                            ${data.components.footer.msg}
                        </div>
                    </div>
                `;
            }
        }

        // Initialize the "simulation"
        renderLayout(serverData);
    </script>
</body>
</html>
