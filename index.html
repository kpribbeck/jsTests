<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>TV Signage Engine</title>
    <style>
        
    </style>
</head>
<body>

    <div id="error-display">
        <h1>⚠️ TV Engine Error</h1>
        <p id="error-msg" style="font-family: monospace; font-size: 1.5rem; background: #300; padding: 20px;"></p>
        <button onclick="location.reload()" style="padding: 15px; font-size: 1.2rem;">Reload Page</button>
    </div>

    <div id="screen-root"></div>

    <script>
        var errorDisplay = document.getElementById('error-display');
        var errorMsg = document.getElementById('error-msg');

        // 1. GLOBAL ERROR CATCHER
        // This catches syntax errors or failed network requests
        window.onerror = function(message, source, lineno, colno, error) {
            showError('Global Error: ' + message + 'at line ' + lineno);
            return true;
        };

        function showError(msg) {
            errorDisplay.style.display = 'block';
            errorMsg.innerText = msg;
        }

        // 1. Simulate the data coming from server
        var serverData = {
            layoutType: "TRIPLE_SPLIT_WITH_FOOTER",
            components: {
                leftCol: {
                    type: "iframe",
                    url: "https://www.wikipedia.org"
                },
                midCol: {
                    type: "video",
                    url: "https://www.w3schools.com/html/mov_bbb.mp4"
                },
                rightCol: {
                    type: "image",
                    url: "https://picsum.photos/1080/1920?random=1"
                },
                footer: {
                    msg: "+++ Lorem ipsum dolor sit amet, consectetur adipiscing elit. This is your TV Engine test +++ ",
                    speed: "20s"
                }
            }
        };

        function renderLayout(data) {
          try {
            var root = document.getElementById('screen-root');

            if (data.layoutType === "TRIPLE_SPLIT_WITH_FOOTER") {
                root.innerHTML = '<div class="main-split">' +
                        '<div class="pane">' +
                            '<iframe src="' + data.components.leftCol.url + '"></iframe>' +
                        '</div>' +

                        '<div class="pane">' +
                            '<video autoplay muted loop playsinline>' +
                                '<source src="' + data.components.midCol.url + '" type="video/mp4">' +
                                'Your browser does not support the video tag.' +
                            '</video>' +
                        '</div>' +

                        '<div class="pane">' +
                            '<img src="' +  data.components.rightCol.url + '">' +
                        '</div>' +
                    '</div>' +

                    '<div class="footer-ticker">' +
                        '<div class="ticker-content" style="animation-duration: ' + data.components.footer.speed + '">' +
                            data.components.footer.msg +
                        '</div>' +
                    '</div>'
                ;
            }
          } catch (err) {
            showError("Render Error: " + err.message);
          }
        }

        renderLayout(serverData);
    </script>
</body>
</html>
