<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vertical Split Screen</title>
    <style>
        /* Remove default browser margins */
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            overflow: hidden; /* Prevents scrollbars */
        }

        .split-container {
            display: flex;
            height: 100vh; /* Full viewport height */
            width: 100vw;  /* Full viewport width */
        }

        .left-side {
            flex: 1; /* Takes up 50% */
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #ffffff;
        }

        .right-side {
            flex: 1; /* Takes up 50% */
        }

        .right-side img {
            width: 100%;
            height: 100%;
            object-fit: cover; /* Important: crops image to fill area without stretching */
            display: block;
        }

        h1 {
            font-family: sans-serif;
            font-size: 3rem;
            color: #333;
        }
    </style>
</head>
<body>

    <div class="split-container">
        <div class="left-side">
            <h1>Hello World</h1>
        </div>

        <div class="right-side">
            <img src="https://picsum.photos/1080/1920" alt="Full screen image">
        </div>
    </div>

</body>
</html>
