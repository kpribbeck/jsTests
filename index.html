<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TV — Server-Driven UI Demo</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #0a0a0a;
    color: #f0f0f0;
    font-family: Arial, sans-serif;
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* ── Main area: two equal columns ── */
  #main {
    display: flex;
    flex: 1;
    overflow: hidden;
  }

  .region-text {
    flex: 1;
    padding: 40px;
    overflow: hidden;
    border-right: 1px solid #222;
  }

  .region-text h2 {
    font-size: 1.1rem;
    font-weight: 400;
    color: #888;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    margin-bottom: 20px;
  }

  .region-text p {
    font-size: 1.05rem;
    line-height: 1.75;
    color: #ccc;
  }

  .region-image {
    flex: 1;
    overflow: hidden;
    position: relative;
  }

  .region-image img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
  }

  /* ── News ticker footer ── */
  #footer {
    height: 44px;
    background: #111;
    border-top: 2px solid #e03030;
    display: flex;
    align-items: center;
    overflow: hidden;
    flex-shrink: 0;
  }

  #ticker-label {
    background: #e03030;
    color: #fff;
    font-size: 0.75rem;
    font-weight: 700;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    padding: 0 14px;
    height: 100%;
    display: flex;
    align-items: center;
    white-space: nowrap;
    flex-shrink: 0;
    z-index: 1;
  }

  #ticker-track {
    flex: 1;
    overflow: hidden;
    position: relative;
    height: 100%;
  }

  #ticker-inner {
    display: inline-flex;
    align-items: center;
    height: 100%;
    white-space: nowrap;
    position: absolute;
    /* animation applied by JS once content width is known */
  }

  #ticker-inner span {
    font-size: 0.85rem;
    color: #ddd;
    letter-spacing: 0.03em;
    padding-right: 80px; /* gap between loop copies */
  }

  /* ── Debug overlay (shows the raw JSON) ── */
  #debug {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.85);
    color: #0f0;
    font-family: monospace;
    font-size: 0.78rem;
    padding: 30px;
    overflow: auto;
    z-index: 999;
    white-space: pre;
  }

  #debug-btn {
    position: fixed;
    top: 12px;
    right: 16px;
    background: rgba(255,255,255,0.08);
    border: 1px solid #444;
    color: #aaa;
    font-size: 0.7rem;
    padding: 4px 10px;
    border-radius: 4px;
    cursor: pointer;
    z-index: 1000;
    font-family: monospace;
    letter-spacing: 0.05em;
  }
  #debug-btn:hover { background: rgba(255,255,255,0.14); }
</style>
</head>
<body>

<button id="debug-btn" onclick="toggleDebug()">{ JSON }</button>
<div id="debug"></div>

<!-- The renderer fills these -->
<div id="main"></div>
<div id="footer"></div>

<script>
/* ─────────────────────────────────────────────
   1. THE PAYLOAD — this is what the server sends
   ───────────────────────────────────────────── */
var serverPayload = {
  layout: {
    type: "split-footer",
    regions: [
      { id: "main-left",  type: "text",   flex: 1 },
      { id: "main-right", type: "image",  flex: 1 },
      { id: "ticker",     type: "ticker"           }
    ]
  },
  content: {
    "main-left": {
      label: "Today's Briefing",
      body: "Lorem ipsum dolor sit amet, consectetur adipiscing elit. " +
            "Sed do eiusmod tempor incididunt ut labore et dolore magna aliqua. " +
            "Ut enim ad minim veniam, quis nostrud exercitation ullamco laboris " +
            "nisi ut aliquip ex ea commodo consequat.\n\n" +
            "Duis aute irure dolor in reprehenderit in voluptate velit esse " +
            "cillum dolore eu fugiat nulla pariatur. Excepteur sint occaecat " +
            "cupidatat non proident, sunt in culpa qui officia deserunt mollit " +
            "anim id est laborum.\n\n" +
            "Pellentesque habitant morbi tristique senectus et netus et malesuada " +
            "fames ac turpis egestas. Vestibulum tortor quam, feugiat vitae, " +
            "ultricies eget, tempor sit amet, ante."
    },
    "main-right": {
      src: "https://picsum.photos/seed/tv42/900/700",
      alt: "Featured image"
    },
    "ticker": {
      text: "Lorem ipsum dolor sit amet  ·  Consectetur adipiscing elit, sed do eiusmod tempor  ·  Ut labore et dolore magna aliqua  ·  Quis nostrud exercitation ullamco laboris nisi  ·  Duis aute irure dolor in reprehenderit  ·  Excepteur sint occaecat cupidatat non proident  ·  "
    }
  }
};

/* ─────────────────────────────────────────────
   2. THE RENDERER — interprets the JSON
   ───────────────────────────────────────────── */
function render(payload) {
  var layout  = payload.layout;
  var content = payload.content;

  layout.regions.forEach(function(region) {
    var data = content[region.id];
    if (!data) return;

    if (region.type === "text") {
      renderText(region, data);
    } else if (region.type === "image") {
      renderImage(region, data);
    } else if (region.type === "ticker") {
      renderTicker(region, data);
    }
  });
}

function renderText(region, data) {
  var div = document.createElement("div");
  div.className = "region-text";
  div.style.flex = region.flex || 1;

  if (data.label) {
    var h2 = document.createElement("h2");
    h2.textContent = data.label;
    div.appendChild(h2);
  }

  var paragraphs = data.body.split("\n\n");
  paragraphs.forEach(function(para) {
    var p = document.createElement("p");
    p.textContent = para;
    p.style.marginBottom = "1rem";
    div.appendChild(p);
  });

  document.getElementById("main").appendChild(div);
}

function renderImage(region, data) {
  var div = document.createElement("div");
  div.className = "region-image";
  div.style.flex = region.flex || 1;

  var img = document.createElement("img");
  img.src = data.src;
  img.alt = data.alt || "";
  div.appendChild(img);

  document.getElementById("main").appendChild(div);
}

function renderTicker(region, data) {
  var footer = document.getElementById("footer");

  var label = document.createElement("div");
  label.id = "ticker-label";
  label.textContent = "LIVE";
  footer.appendChild(label);

  var track = document.createElement("div");
  track.id = "ticker-track";

  var inner = document.createElement("div");
  inner.id = "ticker-inner";

  /* Two copies of the text so the loop is seamless */
  var span1 = document.createElement("span");
  span1.textContent = data.text;
  var span2 = document.createElement("span");
  span2.textContent = data.text;

  inner.appendChild(span1);
  inner.appendChild(span2);
  track.appendChild(inner);
  footer.appendChild(track);

  /* Start animation after the element is in the DOM
     so we can measure the natural width of one copy */
  requestAnimationFrame(function() {
    requestAnimationFrame(function() {
      startTicker(inner, span1);
    });
  });
}

function startTicker(inner, singleCopy) {
  var singleWidth = singleCopy.offsetWidth;
  /* Scroll at ~80px per second */
  var duration = singleWidth / 80;

  inner.style.animation =
    "tickerScroll " + duration.toFixed(1) + "s linear infinite";

  /* Inject the keyframe dynamically */
  var style = document.createElement("style");
  style.textContent =
    "@keyframes tickerScroll {" +
    "  from { transform: translateX(0); }" +
    "  to   { transform: translateX(-" + singleWidth + "px); }" +
    "}";
  document.head.appendChild(style);
}

/* ─────────────────────────────────────────────
   3. DEBUG OVERLAY
   ───────────────────────────────────────────── */
function toggleDebug() {
  var dbg = document.getElementById("debug");
  if (dbg.style.display === "block") {
    dbg.style.display = "none";
  } else {
    dbg.textContent = JSON.stringify(serverPayload, null, 2);
    dbg.style.display = "block";
  }
}

/* ─────────────────────────────────────────────
   4. BOOT — simulate receiving data from server
   ───────────────────────────────────────────── */
render(serverPayload);
</script>
</body>
</html>
