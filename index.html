<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>TV Signage Engine</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; font-family: sans-serif; }
        
        /* Layout Containers */
        #screen-root { display: flex; flex-direction: column; height: 100vh; width: 100vw; }
        
        /* Each pane takes 1/3 of the space */
        .pane { flex: 1; height: 100%; overflow: hidden; border-right: 2px solid #333; }
        .pane:last-child { border-right: none; }

        /* Content scaling */
        iframe, img, video { width: 100%; height: 100%; display: block; border: none; }
        img, video { object-fit: cover; } /* Ensures video fills the column without black bars */

        .main-split { display: flex; flex: 1; overflow: hidden; width: 100%; height: 100%; }
        .left-pane { flex: 1; font-size: 1.5rem; line-height: 1.6; background: white; height: 100%; }
        .left-pane iframe { width: 100%; height: 100%; border: none; }
        .right-pane { width: 100%; height: 100%; flex: 1; }
        .right-pane img { width: 100%; height: 100%; object-fit: cover; }

        /* Looping Ticker Footer */
        .footer-ticker {
            height: 60px;
            background: #cc0000;
            color: white;
            display: flex;
            align-items: center;
            overflow: hidden; /* Hide the text as it leaves the box */
            white-space: nowrap;
            font-size: 1.2rem;
            font-weight: bold;
        }

        .ticker-content {
            display: inline-block;
            padding-left: 100%; /* Start the text off-screen to the right */
            animation: ticker-loop linear infinite;
        }

        @keyframes ticker-loop {
            0% { transform: translate(0, 0); }
            100% { transform: translate(-100%, 0); }
        }
    </style>
</head>
<body>

    <div id="screen-root">
        </div>

    <script>
        // 1. Simulate the data coming from server
        const serverData = {
            layoutType: "TRIPLE_SPLIT",
            components: {
                leftCol: {
                    type: "iframe",
                    url: "https://www.wikipedia.org"
                },
                midCol: {
                    type: "video",
                    url: "https://www.w3schools.com/html/mov_bbb.mp4"
                },
                rightCol: {
                    type: "image",
                    url: "https://picsum.photos/1080/1920?random=1"
                },
                footer: {
                    msg: "+++ Lorem ipsum dolor sit amet, consectetur adipiscing elit. This is your TV Engine test +++ ",
                    speed: "20s"
                }
            }
        };

        function renderLayout(data) {
            const root = document.getElementById('screen-root');

            if (data.layoutType === "TRIPLE_SPLIT") {
                root.innerHTML = `
                    <div class="main-split">
                        <div class="pane">
                            <iframe src="${data.components.leftCol.url}"></iframe>
                        </div>

                        <div class="pane">
                            <video autoplay muted loop playsinline>
                                <source src="${data.components.midCol.url}" type="video/mp4">
                                Your browser does not support the video tag.
                            </video>
                        </div>

                        <div class="pane">
                            <img src="${data.components.rightCol.url}">
                        </div>
                    </div>

                    <div class="footer-ticker">
                        <div class="ticker-content" style="animation-duration: ${data.components.footer.speed}">
                            ${data.components.footer.msg}
                        </div>
                    </div>
                `;
            }
        }
